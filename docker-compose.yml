services:
  postgres:
    image: postgres:16
    container_name: lnu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lnu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lnu123}
      POSTGRES_DB: ${POSTGRES_DB:-lnu_assets}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lnu} -d ${POSTGRES_DB:-lnu_assets}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: lnu_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lnu}:${POSTGRES_PASSWORD:-lnu123}@postgres:5432/${POSTGRES_DB:-lnu_assets}?schema=public
      JWT_SECRET: ${JWT_SECRET:-replace_with_long_random_secret}
      API_PORT: ${API_PORT:-3000}
      NODE_ENV: production
    command: ["npm", "run", "start:docker"]
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://lnu_api:3000}
        NEXT_PUBLIC_SESSION_TIMEOUT_MS: ${NEXT_PUBLIC_SESSION_TIMEOUT_MS:-1800000}
    container_name: lnu_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://lnu_api:3000}
      NEXT_PUBLIC_SESSION_TIMEOUT_MS: ${NEXT_PUBLIC_SESSION_TIMEOUT_MS:-1800000}
      NODE_ENV: production
    ports:
      - "${WEB_PORT:-3001}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
